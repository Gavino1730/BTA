<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BTA Test Data Loader</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      max-width: 600px;
      margin: 40px auto;
      padding: 20px;
      background: #f5f5f5;
    }
    .container {
      background: white;
      border-radius: 8px;
      padding: 30px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    }
    h1 {
      color: #2d162b;
      margin-top: 0;
    }
    .button-group {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }
    button {
      flex: 1;
      padding: 12px 20px;
      font-size: 16px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 500;
      transition: all 0.2s;
    }
    .btn-load {
      background: #2dd4bf;
      color: white;
    }
    .btn-load:hover {
      background: #14b8a6;
    }
    .btn-clear {
      background: #f87171;
      color: white;
    }
    .btn-clear:hover {
      background: #dc2626;
    }
    .btn-view {
      background: #60a5fa;
      color: white;
    }
    .btn-view:hover {
      background: #3b82f6;
    }
    .status {
      margin-top: 20px;
      padding: 15px;
      border-radius: 6px;
      display: none;
      font-weight: 500;
    }
    .status.success {
      background: #d1fae5;
      color: #065f46;
      display: block;
    }
    .status.error {
      background: #fee2e2;
      color: #7f1d1d;
      display: block;
    }
    .data-preview {
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 6px;
      padding: 15px;
      margin-top: 20px;
      max-height: 300px;
      overflow-y: auto;
      font-family: monospace;
      font-size: 12px;
      white-space: pre-wrap;
      word-break: break-all;
    }
    .teams-list {
      margin-top: 20px;
    }
    .team-card {
      background: #f9fafb;
      border-left: 4px solid #2dd4bf;
      padding: 15px;
      margin-bottom: 10px;
      border-radius: 4px;
    }
    .team-name {
      font-weight: bold;
      font-size: 16px;
      color: #1f2937;
    }
    .team-info {
      color: #6b7280;
      font-size: 13px;
      margin-top: 5px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🏀 BTA Test Data Loader</h1>
    <p>Load test teams and rosters into the iPad Operator app.</p>
    
    <div class="teams-list" id="teamsList"></div>
    
    <div class="button-group">
      <button class="btn-load" onclick="loadTestData()">Load Test Data</button>
      <button class="btn-view" onclick="viewData()">View Current Data</button>
      <button class="btn-clear" onclick="clearData()">Clear All Data</button>
    </div>
    
    <div id="status" class="status"></div>
    <div id="preview" class="data-preview" style="display: none;"></div>
  </div>

  <script>
    const TEST_DATA = {
      "teams": [

            {"id": "player-2", "number": "24", "name": "Chris Williams", "position": "SF", "height": "6'7\"", "grade": "12"},
            {"id": "player-3", "number": "25", "name": "Alex Davis", "position": "PF", "height": "6'9\"", "grade": "11"},
            {"id": "player-4", "number": "30", "name": "James Brown", "position": "C", "height": "6'11\"", "grade": "12"},
            {"id": "player-5", "number": "32", "name": "David Martinez", "position": "PG", "height": "6'1\"", "grade": "11"},
            {"id": "player-6", "number": "41", "name": "Kevin Anderson", "position": "SG", "height": "6'3\"", "grade": "10"},
            {"id": "player-7", "number": "42", "name": "Ryan Thompson", "position": "SF", "height": "6'5\"", "grade": "10"},
            {"id": "player-8", "number": "43", "name": "Evan Taylor", "position": "PF", "height": "6'8\"", "grade": "11"},
            {"id": "player-9", "number": "55", "name": "Mike Thomas", "position": "C", "height": "6'10\"", "grade": "10"},
            {"id": "player-10", "number": "10", "name": "Josh Wilson", "position": "PG", "height": "6'0\"", "grade": "10"}
          ]
        },
        {
          "id": "team-away",
          "name": "Tigers",
          "abbreviation": "TIG",
          "players": [
            {"id": "player-20", "number": "21", "name": "Tyler Rodriguez", "position": "SG", "height": "6'3\"", "grade": "12"},
            {"id": "player-21", "number": "22", "name": "Brandon Garcia", "position": "SF", "height": "6'6\"", "grade": "12"},
            {"id": "player-22", "number": "40", "name": "Cameron White", "position": "PF", "height": "6'8\"", "grade": "11"},
            {"id": "player-23", "number": "50", "name": "Derek Lee", "position": "C", "height": "6'10\"", "grade": "12"},
            {"id": "player-24", "number": "11", "name": "Brandon Clark", "position": "PG", "height": "6'2\"", "grade": "11"},
            {"id": "player-25", "number": "33", "name": "Kyle Harris", "position": "SG", "height": "6'2\"", "grade": "10"},
            {"id": "player-26", "number": "34", "name": "Nathan Lewis", "position": "SF", "height": "6'4\"", "grade": "10"},
            {"id": "player-27", "number": "35", "name": "Jordan Walker", "position": "PF", "height": "6'7\"", "grade": "11"},
            {"id": "player-28", "number": "51", "name": "Trevor Hall", "position": "C", "height": "6'9\"", "grade": "10"},
            {"id": "player-29", "number": "12", "name": "Mason Young", "position": "PG", "height": "6'0\"", "grade": "10"}
          ]
        },
        {
          "id": "team-test",
          "name": "test team",
          "abbreviation": "TST",
          "players": [
            {"id": "player-30", "number": "1", "name": "Test Player One", "position": "PG", "height": "6'0\"", "grade": "12"},
            {"id": "player-31", "number": "2", "name": "Test Player Two", "position": "SG", "height": "6'2\"", "grade": "12"},
            {"id": "player-32", "number": "3", "name": "Test Player Three", "position": "SF", "height": "6'5\"", "grade": "11"},
            {"id": "player-33", "number": "4", "name": "Test Player Four", "position": "PF", "height": "6'7\"", "grade": "11"},
            {"id": "player-34", "number": "5", "name": "Test Player Five", "position": "C", "height": "6'9\"", "grade": "12"},
            {"id": "player-35", "number": "10", "name": "Test Player Six", "position": "PG", "height": "5'11\"", "grade": "10"},
            {"id": "player-36", "number": "11", "name": "Test Player Seven", "position": "SG", "height": "6'1\"", "grade": "10"},
            {"id": "player-37", "number": "12", "name": "Test Player Eight", "position": "SF", "height": "6'3\"", "grade": "9"},
            {"id": "player-38", "number": "13", "name": "Test Player Nine", "position": "PF", "height": "6'6\"", "grade": "9"},
            {"id": "player-39", "number": "14", "name": "Test Player Ten", "position": "C", "height": "6'8\"", "grade": "10"}
          ]
        }
      ],
      "gameSetup": {
        "gameId": "2026-03-22-warriors",
        "myTeamId": "team-home",
        "apiUrl": "http://localhost:4000",
        "apiKey": "",
        "opponent": "Tigers",
        "vcSide": "home",
        "dashboardUrl": "http://localhost:5000",
        "statsGameId": null
      }
    };

    const APP_DATA_KEY = "bta-app-data-v3";

    function loadTestData() {
      try {
        const appData = {
          teams: TEST_DATA.teams,
          gameSetup: TEST_DATA.gameSetup
        };
        localStorage.setItem(APP_DATA_KEY, JSON.stringify(appData));
        showStatus('✅ Test data loaded successfully! Refresh the iPad Operator app (port 5174) to see the teams.', 'success');
      } catch (e) {
        showStatus('❌ Error loading data: ' + e.message, 'error');
      }
    }

    function clearData() {
      if (confirm('Are you sure you want to clear all stored data?')) {
        try {
          localStorage.removeItem(APP_DATA_KEY);
          showStatus('✅ All data cleared.', 'success');
        } catch (e) {
          showStatus('❌ Error clearing data: ' + e.message, 'error');
        }
      }
    }

    function viewData() {
      try {
        const stored = localStorage.getItem(APP_DATA_KEY);
        const preview = document.getElementById('preview');
        if (stored) {
          preview.textContent = JSON.stringify(JSON.parse(stored), null, 2);
          preview.style.display = 'block';
        } else {
          preview.textContent = 'No data stored. Click "Load Test Data" first.';
          preview.style.display = 'block';
        }
      } catch (e) {
        showStatus('❌ Error viewing data: ' + e.message, 'error');
      }
    }

    function showStatus(message, type) {
      const status = document.getElementById('status');
      status.textContent = message;
      status.className = 'status ' + type;
    }

    function renderTeams() {
      const list = document.getElementById('teamsList');
      list.innerHTML = '<h2>Teams:</h2>' + TEST_DATA.teams.map(team => `
        <div class="team-card">
          <div class="team-name">${team.name} (${team.abbreviation})</div>
          <div class="team-info">
            ${team.players.length} players
            <br/>
            Roster: ${team.players.map(p => `#${p.number} ${p.name} (${p.position})`).join(', ')}
          </div>
        </div>
      `).join('');
    }

    // Initialize
    renderTeams();
  </script>
</body>
</html>
