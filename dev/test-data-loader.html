<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test Data Loader</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      max-width: 600px;
      margin: 40px auto;
      padding: 20px;
      background: #f5f5f5;
    }
    .container {
      background: white;
      border-radius: 8px;
      padding: 30px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    }
    h1 {
      color: #2d162b;
      margin-top: 0;
    }
    .button-group {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }
    button {
      flex: 1;
      padding: 12px 20px;
      font-size: 16px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 500;
      transition: all 0.2s;
    }
    .btn-load {
      background: #2dd4bf;
      color: white;
    }
    .btn-load:hover {
      background: #14b8a6;
    }
    .btn-clear {
      background: #f87171;
      color: white;
    }
    .btn-clear:hover {
      background: #dc2626;
    }
    .btn-view {
      background: #60a5fa;
      color: white;
    }
    .btn-view:hover {
      background: #3b82f6;
    }
    .status {
      margin-top: 20px;
      padding: 15px;
      border-radius: 6px;
      display: none;
      font-weight: 500;
    }
    .status.success {
      background: #d1fae5;
      color: #065f46;
      display: block;
    }
    .status.error {
      background: #fee2e2;
      color: #7f1d1d;
      display: block;
    }
    .data-preview {
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 6px;
      padding: 15px;
      margin-top: 20px;
      max-height: 300px;
      overflow-y: auto;
      font-family: monospace;
      font-size: 12px;
      white-space: pre-wrap;
      word-break: break-all;
    }
    .teams-list {
      margin-top: 20px;
    }
    .team-card {
      background: #f9fafb;
      border-left: 4px solid #2dd4bf;
      padding: 15px;
      margin-bottom: 10px;
      border-radius: 4px;
    }
    .team-name {
      font-weight: bold;
      font-size: 16px;
      color: #1f2937;
    }
    .team-info {
      color: #6b7280;
      font-size: 13px;
      margin-top: 5px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🏀 Test Data Loader</h1>
    <p>Load a single USA test roster into shared app storage.</p>
    
    <div class="teams-list" id="teamsList"></div>
    
    <div class="button-group">
      <button class="btn-load" onclick="loadTestData()">Load Test Data</button>
      <button class="btn-view" onclick="viewData()">View Current Data</button>
      <button class="btn-clear" onclick="clearData()">Clear All Data</button>
    </div>
    
    <div id="status" class="status"></div>
    <div id="preview" class="data-preview" style="display: none;"></div>
  </div>

  <script>
    const TEST_DATA = {
      "teams": [
        {
          "id": "team-usa",
          "name": "USA",
          "abbreviation": "USA",
          "players": [
            {"id": "usa-4", "number": "4", "name": "Stephen Curry", "position": "PG", "height": "6'2\"", "grade": "Pro"},
            {"id": "usa-6", "number": "6", "name": "LeBron James", "position": "SF", "height": "6'9\"", "grade": "Pro"},
            {"id": "usa-7", "number": "7", "name": "Kevin Durant", "position": "SF", "height": "6'10\"", "grade": "Pro"},
            {"id": "usa-8", "number": "8", "name": "Kobe Bryant", "position": "SG", "height": "6'6\"", "grade": "Pro"},
            {"id": "usa-9", "number": "9", "name": "Michael Jordan", "position": "SG", "height": "6'6\"", "grade": "Pro"},
            {"id": "usa-10", "number": "10", "name": "Magic Johnson", "position": "PG", "height": "6'9\"", "grade": "Pro"},
            {"id": "usa-11", "number": "11", "name": "Kyrie Irving", "position": "PG", "height": "6'2\"", "grade": "Pro"},
            {"id": "usa-13", "number": "13", "name": "Anthony Davis", "position": "PF", "height": "6'10\"", "grade": "Pro"},
            {"id": "usa-15", "number": "15", "name": "Carmelo Anthony", "position": "PF", "height": "6'7\"", "grade": "Pro"},
            {"id": "usa-34", "number": "34", "name": "Shaquille O'Neal", "position": "C", "height": "7'1\"", "grade": "Pro"}
          ]
        }
      ],
      "gameSetup": {
        "gameId": "2026-03-22-usa",
        "myTeamId": "team-usa",
        "apiUrl": "http://localhost:4000",
        "apiKey": "",
        "opponent": "Practice Opponent",
        "vcSide": "home",
        "dashboardUrl": "http://localhost:5000",
        "statsGameId": null
      }
    };

    const APP_DATA_KEY = "shared-app-data-v3";

    function loadTestData() {
      try {
        const appData = {
          teams: TEST_DATA.teams,
          gameSetup: TEST_DATA.gameSetup
        };
        localStorage.setItem(APP_DATA_KEY, JSON.stringify(appData));
        showStatus('✅ USA test roster loaded. Refresh Coach Dashboard and Operator Console to see the team.', 'success');
      } catch (e) {
        showStatus('❌ Error loading data: ' + e.message, 'error');
      }
    }

    function clearData() {
      if (confirm('Are you sure you want to clear all stored data?')) {
        try {
          localStorage.removeItem(APP_DATA_KEY);
          showStatus('✅ All data cleared.', 'success');
        } catch (e) {
          showStatus('❌ Error clearing data: ' + e.message, 'error');
        }
      }
    }

    function viewData() {
      try {
        const stored = localStorage.getItem(APP_DATA_KEY);
        const preview = document.getElementById('preview');
        if (stored) {
          preview.textContent = JSON.stringify(JSON.parse(stored), null, 2);
          preview.style.display = 'block';
        } else {
          preview.textContent = 'No data stored. Click "Load Test Data" first.';
          preview.style.display = 'block';
        }
      } catch (e) {
        showStatus('❌ Error viewing data: ' + e.message, 'error');
      }
    }

    function showStatus(message, type) {
      const status = document.getElementById('status');
      status.textContent = message;
      status.className = 'status ' + type;
    }

    function renderTeams() {
      const list = document.getElementById('teamsList');
      list.innerHTML = '<h2>Teams:</h2>' + TEST_DATA.teams.map(team => `
        <div class="team-card">
          <div class="team-name">${team.name} (${team.abbreviation})</div>
          <div class="team-info">
            ${team.players.length} players
            <br/>
            Roster: ${team.players.map(p => `#${p.number} ${p.name} (${p.position})`).join(', ')}
          </div>
        </div>
      `).join('');
    }

    // Initialize
    renderTeams();
  </script>
</body>
</html>
