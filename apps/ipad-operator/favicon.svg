<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- iPad Operator: Tablet with input icon -->
  <rect width="100" height="100" fill="#1f2937" rx="20"/>
  <rect x="20" y="15" width="60" height="75" fill="#10b981" rx="4"/>
  <rect x="25" y="20" width="50" height="55" fill="#f3f4f6" rx="2"/>
  <circle cx="50" cy="80" r="3" fill="#10b981"/>
  <!-- Stylus/pen input indicator -->
  <g transform="translate(45, 35)">
    <polyline points="5,-10 0,0 -5,10" stroke="#059669" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <circle cx="0" cy="0" r="4" fill="none" stroke="#059669" stroke-width="2"/>
  </g>
</svg>