<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Stats Dashboard: Bar chart -->
  <rect width="100" height="100" fill="#1f2937" rx="20"/>
  <g transform="translate(25, 30)">
    <!-- Chart bars -->
    <rect x="5" y="30" width="6" height="25" fill="#f59e0b" rx="1"/>
    <rect x="15" y="20" width="6" height="35" fill="#f59e0b" rx="1"/>
    <rect x="25" y="15" width="6" height="40" fill="#f59e0b" rx="1"/>
    <rect x="35" y="25" width="6" height="30" fill="#f59e0b" rx="1"/>
    <!-- Axes -->
    <line x1="2" y1="56" x2="43" y2="56" stroke="#d1d5db" stroke-width="1.5"/>
    <line x1="2" y1="0" x2="2" y2="56" stroke="#d1d5db" stroke-width="1.5"/>
  </g>
</svg>