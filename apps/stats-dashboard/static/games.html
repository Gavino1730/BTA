<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Bench IQ">
    <meta name="theme-color" content="#1a1a2e">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Games — Stats Dashboard</title>
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg" />
    <link rel="apple-touch-icon" href="/static/apple-touch-icon.png" />
    <link rel="manifest" href="/static/manifest.json" />
    <link rel="stylesheet" href="/static/style.css?v=3.4">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.js"></script>
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <div class="logo">Bench IQ</div>
            <ul class="nav-links">
                <li><a href="/" class="nav-link" data-page="dashboard">Dashboard</a></li>
                <li><a href="/games" class="nav-link active" data-page="games">Games</a></li>
                <li><a href="/players" class="nav-link" data-page="players">Players</a></li>
                <li><a href="/trends" class="nav-link" data-page="trends">Trends</a></li>
                <li><a href="/ai-insights" class="nav-link" data-page="ai-insights">AI</a></li>
                <li><a href="/settings" class="nav-link" data-page="settings">Settings</a></li>
            </ul>
            <button class="tour-help-btn" onclick="tourStart()" title="Help &amp; Tutorial" aria-label="Help and Tutorial">?</button>
        </div>
    </nav>
    <style>
      .tour-help-btn{background:transparent;border:1.5px solid #4f8cff;color:#4f8cff;border-radius:50%;width:28px;height:28px;font-size:14px;font-weight:700;cursor:pointer;line-height:1;transition:background .15s,color .15s;flex-shrink:0;margin-left:8px;}
      .tour-help-btn:hover{background:#4f8cff;color:#fff;}
    </style>

    <div class="container main-content">
<div class="games-page">
    <h1>Games</h1>
    
    <div class="games-filter">
        <input type="text" id="game-search" placeholder="Search opponent...">
        <select id="game-result-filter" title="Filter games by result">
            <option value="">All Results</option>
            <option value="W">Wins</option>
            <option value="L">Losses</option>
        </select>
    </div>

    <div id="games-container" class="games-container"></div>

    <!-- Game Detail Modal -->
    <div id="gameModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <div id="gameDetail"></div>
        </div>
    </div>
</div>

<style>
.games-page .game-card {
    background: linear-gradient(160deg, rgba(24, 42, 84, 0.95) 0%, rgba(16, 32, 67, 0.96) 100%);
    border-radius: 14px;
    padding: 1rem;
    box-shadow: 0 10px 22px rgba(0, 0, 0, 0.24);
    border: 1px solid rgba(255, 255, 255, 0.14);
    transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
    gap: 0.95rem;
    min-height: 210px;
}

.games-page .game-card:hover {
    transform: translateY(-3px);
    box-shadow: 0 14px 28px rgba(0, 0, 0, 0.32);
    border-color: rgba(79, 140, 255, 0.55);
}

.games-page .game-card-header {
    align-items: flex-start;
    gap: 0.65rem;
}

.games-page .game-card-date {
    font-size: 0.82rem;
    font-weight: 700;
    letter-spacing: 0.02em;
}

.games-page .game-card-actions {
    gap: 0.4rem;
}

.games-page .game-card .result-badge {
    min-width: 30px;
    padding: 0.28rem 0.5rem;
    border-radius: 8px;
    font-size: 0.72rem;
    line-height: 1;
}

.games-page .game-edit-btn {
    background: rgba(79, 140, 255, 0.14) !important;
    border: 1px solid rgba(79, 140, 255, 0.35) !important;
    color: var(--primary) !important;
    border-radius: 7px;
    padding: 0.2rem 0.45rem;
    min-width: 34px;
    font-size: 0.72rem;
    font-weight: 700;
    line-height: 1.25;
}

.games-page .game-edit-btn:hover {
    background: rgba(79, 140, 255, 0.24) !important;
    border-color: var(--primary) !important;
    color: #cfe0ff !important;
}

.games-page .game-delete-btn {
    background: rgba(248, 113, 113, 0.1) !important;
    border: 1px solid rgba(248, 113, 113, 0.35) !important;
    color: var(--danger) !important;
    border-radius: 7px;
    padding: 0.2rem 0.45rem;
    min-width: 34px;
    font-size: 0.72rem;
    font-weight: 700;
    line-height: 1.25;
}

.games-page .game-delete-btn:hover {
    background: rgba(248, 113, 113, 0.2) !important;
    border-color: var(--danger) !important;
    color: #ffd2d2 !important;
}

.games-page .game-card-opponent {
    font-size: 1.1rem;
    font-weight: 800;
    letter-spacing: 0.04em;
    text-align: center;
}

.games-page .game-card-score {
    justify-content: center;
    gap: 0.9rem;
    padding: 0.75rem 0;
    border-top: 1px solid rgba(255, 255, 255, 0.12);
    border-bottom: 1px solid rgba(255, 255, 255, 0.12);
}

.games-page .game-card-score-vc,
.games-page .game-card-score-opp {
    font-size: 2rem;
    font-weight: 800;
    min-width: 2ch;
}

.games-page .game-card-score-divider {
    color: rgba(255, 255, 255, 0.32);
    font-size: 1.3rem;
    font-weight: 700;
}

.games-page .game-card-diff {
    font-size: 1.15rem;
    font-weight: 800;
    padding: 0.42rem 0.6rem;
    border-radius: 10px;
    background: rgba(255, 255, 255, 0.06);
    min-width: 56px;
    margin: 0 auto;
}
</style>
    </div>

    <script src="/static/main.js?v=3.0"></script>
    <script src="/static/tour.js?v=1.0"></script>
    <script src="/static/games.js?v=3.5"></script>
</body>
</html>
