<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Realtime API: Network nodes -->
  <rect width="100" height="100" fill="#1f2937" rx="20"/>
  <g transform="translate(50, 50)">
    <!-- Central node -->
    <circle cx="0" cy="0" r="5" fill="#06b6d4"/>
    <!-- Outer nodes -->
    <circle cx="18" cy="0" r="4" fill="#06b6d4"/>
    <circle cx="-18" cy="0" r="4" fill="#06b6d4"/>
    <circle cx="0" cy="18" r="4" fill="#06b6d4"/>
    <circle cx="0" cy="-18" r="4" fill="#06b6d4"/>
    <!-- Connection lines -->
    <line x1="0" y1="0" x2="14" y2="0" stroke="#06b6d4" stroke-width="1.5"/>
    <line x1="0" y1="0" x2="-14" y2="0" stroke="#06b6d4" stroke-width="1.5"/>
    <line x1="0" y1="0" x2="0" y2="14" stroke="#06b6d4" stroke-width="1.5"/>
    <line x1="0" y1="0" x2="0" y2="-14" stroke="#06b6d4" stroke-width="1.5"/>
  </g>
</svg>